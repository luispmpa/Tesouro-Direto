name: Deploy GitHub Pages

# Publica o site estático (HTML/CSS/JS) no GitHub Pages a cada push na branch principal.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas um deploy por vez, sem cancelar execuções em andamento
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica a raiz do repositório (site estático sem etapa de build)
          path: .

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
