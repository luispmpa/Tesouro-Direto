<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B1220">
    <meta name="color-scheme" content="dark light">
    <title>Painel Financeiro | Tesouro, IBOV, PGBL e Alertas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="app">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-logo">₿</div>
                <div>
                    <div class="brand-name">Painel Financeiro</div>
                    <div class="brand-sub">Tesouro · IBOV · PGBL</div>
                </div>
            </div>

            <div class="nav-label">Visão geral</div>
            <a class="nav-item" href="#/" data-route="/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
                Dashboard
            </a>

            <div class="nav-label">Investimentos</div>
            <a class="nav-item" href="#/tesouro" data-route="/tesouro">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6"/></svg>
                Tesouro Direto
            </a>
            <a class="nav-item" href="#/ibov" data-route="/ibov">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8M21 7v6m0-6h-6"/></svg>
                IBOV / Ações
            </a>
            <a class="nav-item" href="#/pgbl" data-route="/pgbl">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                Previdência PGBL
            </a>

            <div class="nav-label">Monitoramento</div>
            <a class="nav-item" href="#/alertas" data-route="/alertas">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/></svg>
                Alertas <span id="nav-alert-badge"></span>
            </a>
            <a class="nav-item" href="#/dados" data-route="/dados">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                Dados &amp; Integrações
            </a>

            <div class="sidebar-footer">
                Acompanhamento pessoal — não é recomendação de investimento.
            </div>
        </aside>

        <div class="main">
            <header class="topbar">
                <button class="burger" id="burger" aria-label="Abrir menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                </button>
                <h1 id="page-title">Dashboard</h1>
                <div class="spacer"></div>
                <span class="last-update" id="global-last-update"></span>
                <button class="btn btn-secondary btn-sm" id="btn-theme" title="Alternar tema claro/escuro">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
                </button>
                <button class="btn btn-primary btn-sm" id="btn-global-refresh" title="Sincronizar com a planilha do Drive (IBOV, PGBL, alertas)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                    Sincronizar
                </button>
            </header>

            <main class="content" id="view" aria-live="polite">
                <!-- Conteúdo renderizado pelo router (assets/js/app.js) -->
            </main>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-root"></div>

    <!-- Chart.js para gráficos e SheetJS para importar planilhas Excel -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
